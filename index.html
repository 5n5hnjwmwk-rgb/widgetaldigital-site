<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Widgetal Digital</title>

<style>

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    margin:0;
    background:#fafafa;
    color:#222;
}

.container{
    max-width:820px;
    margin:auto;
    padding:80px 20px;
}

h1{
    font-size:40px;
    margin-bottom:10px;
}

.tagline{
    font-size:20px;
    color:#666;
    margin-bottom:60px;
}

.apps{
    display:grid;
    gap:40px;
}

.app{
    padding:24px;
    border-radius:12px;
    background:white;
    box-shadow:0 3px 12px rgba(0,0,0,.06);
}

.app h2{
    margin:0 0 10px 0;
}

.app p{
    margin:0;
    color:#555;
}

footer{
    margin-top:80px;
    color:#777;
    font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h1>Widgetal Digital</h1>

<p class="tagline">
Apps, tools, and utilities built with care.
</p>

<div class="apps">

<div class="app">
<h2>YAWA</h2>
<p>Weather for people who care about weather.</p>
</div>

<div class="app">
<h2>POS Calculator</h2>
<p>Retail math made simple.</p>
</div>

<div class="app">
<h2>MyLists</h2>
<p>Fast lists with backup and restore.</p>
</div>

</div>

<footer>
© 2026 Widgetal Digital LLC
</footer>

</div>

</body>
</html>
