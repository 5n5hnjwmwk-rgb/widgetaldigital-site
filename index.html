<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Widgetal Digital</title>

<style>

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    margin:0;
    background:#f5f5f7;
    color:#1d1d1f;
}

.container{
    max-width:820px;
    margin:auto;
    padding:80px 20px;
}

h1{
    font-size:42px;
    margin-bottom:8px;
}

.tagline{
    font-size:20px;
    color:#6e6e73;
    margin-bottom:60px;
    max-width:560px;
}

.apps{
    display:grid;
    gap:36px;
}

.app{
    padding:28px;
    border-radius:14px;
    background:white;
    box-shadow:0 6px 18px rgba(0,0,0,.07);
    transition:all .25s ease;
}

.app:hover{
    transform:translateY(-4px);
    box-shadow:0 12px 28px rgba(0,0,0,.12);
}

.app h2{
    margin:0 0 10px 0;
}

.app p{
    margin:0;
    color:#555;
}

.button{
    display:inline-block;
    margin-top:16px;
    padding:9px 16px;
    border-radius:8px;
    background:#007aff;
    color:white;
    text-decoration:none;
    font-size:14px;
    font-weight:500;
}

.button:hover{
    background:#0064d6;
}

footer{
    margin-top:80px;
    color:#86868b;
    font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h1>Widgetal Digital</h1>

<p class="tagline">
Independent software studio building thoughtful utilities and apps.
</p>

<div class="apps">

<div class="app">
<h2>YAWA</h2>
<p>Weather for people who care about weather.</p>
<a class="button" href="#">View App</a>
</div>

<div class="app">
<h2>POS Calculator</h2>
<p>Retail math made simple.</p>
<a class="button" href="#">View App</a>
</div>

<div class="app">
<h2>MyLists</h2>
<p>Fast voice-driven lists.</p>
<a class="button" href="#">View App</a>
</div>

</div>

<footer>
© 2026 Widgetal Digital LLC
</footer>

</div>

</body>
</html>
