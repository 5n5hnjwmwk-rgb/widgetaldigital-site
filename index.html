<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Widgetal Digital</title>

<style>

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    margin:0;
    background:#f5f5f7;
    color:#1d1d1f;
}

/* Hero header */

.hero{
    background: linear-gradient(
        135deg,
        #f5f7fa 0%,
        #e9f2ff 40%,
        #f5f5f7 100%
    );
    padding:100px 20px 80px;
}

.hero-inner{
    max-width:820px;
    margin:auto;
}

.hero h1{
    font-size:42px;
    margin-bottom:8px;
}

.tagline{
    font-size:20px;
    color:#6e6e73;
    max-width:560px;
}

/* Main container */

.container{
    max-width:820px;
    margin:auto;
    padding:60px 20px 80px;
}

/* App cards */

.apps{
    display:grid;
    gap:36px;
}

.app{
    padding:28px;
    border-radius:14px;
    background:white;
    box-shadow:0 6px 18px rgba(0,0,0,.07);
    transition:all .25s ease;
}

.app:hover{
    transform:translateY(-4px);
    box-shadow:0 12px 28px rgba(0,0,0,.12);
}

/* App header with icon */

.app-header{
    display:flex;
    align-items:center;
    gap:12px;
}

.icon{
    font-size:28px;
}

.app h2{
    margin:0;
}

.app p{
    margin:12px 0 0;
    color:#555;
}

/* Buttons */

.button{
    display:inline-block;
    margin-top:16px;
    padding:9px 16px;
    border-radius:8px;
    background:#007aff;
    color:white;
    text-decoration:none;
    font-size:14px;
    font-weight:500;
}

.button:hover{
    background:#0064d6;
}

/* Footer */

footer{
    margin-top:80px;
    color:#86868b;
    font-size:14px;
}

</style>

</head>

<body>

<div class="hero">
  <div class="hero-inner">
    <h1>Widgetal Digital</h1>
    <p class="tagline">
      Independent software studio building thoughtful utilities and apps.
    </p>
  </div>
</div>

<div class="container">

<div class="apps">

<div class="app">
  <div class="app-header">
    <span class="icon">🌦️</span>
    <h2>YAWA</h2>
  </div>
  <p>Weather for people who care about weather.</p>
  <a class="button" href="#">View App</a>
</div>

<div class="app">
  <div class="app-header">
    <span class="icon">🧮</span>
    <h2>POS Calculator</h2>
  </div>
  <p>Retail math made simple.</p>
  <a href="https://apps.apple.com/app/poscalculator/id6757638867">
<img class="appstore" src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store">
</a>
</div>

<div class="app">
  <div class="app-header">
    <span class="icon">📝</span>
    <h2>MyLists</h2>
  </div>
  <p>Fast lists with backup.</p>
  <a class="button" href="#">View App</a>
</div>

</div>

<footer>
© 2026 Widgetal Digital LLC
</footer>

</div>

</body>
</html>
